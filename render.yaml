services:
  - type: web
    name: fleetos-order-service
    runtime: node
    rootDir: services/order-service
    buildCommand: npm install
    startCommand: npm run dev
    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: fleetos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: fleetos-rider-service
    runtime: node
    rootDir: services/rider-service
    buildCommand: npm install
    startCommand: npm run dev
    envVars:
      - key: PORT
        value: 3002

databases:
  - name: fleetos-db
    plan: free
    databaseName: fleetos
    user: fleetos
