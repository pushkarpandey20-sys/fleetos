services:
  - type: web
    name: fleetos-api
    runtime: node
    rootDir: services/order-service
    buildCommand: npm install --ignore-scripts
    startCommand: npm run dev
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: KAFKA_BROKERS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: TRACKING_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
