<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleetOS — Control Tower</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:#2e3250;--text:#e8eaf6;--text2:#8b90b8;--text3:#555a7a;--blue:#4f8ef7;--green:#3ecf8e;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-text{font-size:16px;font-weight:700}.logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);padding:12px 8px 4px;text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);transition:all .12s;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:rgba(79,142,247,.15);color:var(--blue)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.role-bar{padding:12px;border-top:1px solid var(--border)}
.role-label{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:600;flex:1}
.pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:11px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%}.dot-g{background:var(--green)}.dot-r{background:var(--red)}.dot-a{background:var(--amber)}
.content{flex:1;overflow-y:auto;padding:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.card.bl{border-left:3px solid var(--blue)}.card.gl{border-left:3px solid var(--green)}
.card.rl{border-left:3px solid var(--red)}.card.al{border-left:3px solid var(--amber)}
.card-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.card-value{font-size:26px;font-weight:700;line-height:1}.card-sub{font-size:11px;color:var(--text3);margin-top:4px}
.section-title{font-size:13px;font-weight:600;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--text3);border-bottom:1px solid var(--border);font-weight:500;font-size:11px}
td{padding:9px 10px;border-bottom:1px solid rgba(46,50,80,.5);color:var(--text);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
.bb{background:rgba(79,142,247,.15);color:var(--blue)}.bg-b{background:rgba(62,207,142,.15);color:var(--green)}
.br{background:rgba(248,113,113,.15);color:var(--red)}.ba{background:rgba(251,191,36,.15);color:var(--amber)}
.bp{background:rgba(167,139,250,.15);color:var(--purple)}.bk{background:var(--bg3);color:var(--text2)}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:400px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{font-size:40px;display:block;margin-bottom:8px}
.login-logo-text{font-size:22px;font-weight:700}.login-logo-sub{font-size:12px;color:var(--text2);margin-top:4px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;outline:none}
.form-input:focus{border-color:var(--blue)}
.btn{display:block;width:100%;padding:11px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s}
.btn:hover{opacity:.85}.btn-primary{background:var(--blue);color:#fff}
.btn-sm{display:inline-flex;align-items:center;padding:6px 14px;border-radius:6px;border:none;font-size:12px;font-weight:500;cursor:pointer}
.btn-green{background:rgba(62,207,142,.2);color:var(--green)}.btn-red{background:rgba(248,113,113,.2);color:var(--red)}
.login-links{display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap}
.login-link{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .12s}
.login-link:hover{color:var(--text);border-color:var(--blue)}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:14px}
.info{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--blue);padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:14px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.live-url{background:var(--bg3);border:1px solid var(--green);border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.dead-dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:480px;max-width:95vw}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.map-box{background:var(--bg3);border-radius:10px;height:300px;position:relative;overflow:hidden}
.map-legend{position:absolute;bottom:10px;right:10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px}
.leg-row{display:flex;align-items:center;gap:7px;color:var(--text2);margin-bottom:4px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rider-card{background:var(--bg3);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:rgba(79,142,247,.2);color:var(--blue)}
.api-block{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-family:monospace;font-size:12px;line-height:1.6}
.method{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;margin-right:8px}
.get{background:rgba(62,207,142,.2);color:var(--green)}.post{background:rgba(79,142,247,.2);color:var(--blue)}
.put{background:rgba(251,191,36,.2);color:var(--amber)}.del{background:rgba(248,113,113,.2);color:var(--red)}
.status-bar{padding:6px 12px;background:rgba(248,113,113,.1);border-bottom:1px solid rgba(248,113,113,.2);font-size:11px;color:var(--red);text-align:center}
.status-bar.ok{background:rgba(62,207,142,.1);border-color:rgba(62,207,142,.2);color:var(--green)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API='https://fleetos-xcgj.onrender.com';
const {useState,useEffect,useCallback,useRef}=React;

// Smart fetch — direct first, CORS proxy fallback
async function smartFetch(url, opts={}) {
  try {
    const r = await fetch(url, {...opts, mode:'cors'});
    return r;
  } catch(e) {
    // CORS blocked — try proxy
    const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
    return fetch(proxy, opts);
  }
}

function useAuth(){
  const [token,setToken]=useState(localStorage.getItem('ft'));
  const [user,setUser]=useState(JSON.parse(localStorage.getItem('ftu')||'null'));
  const [apiStatus,setApiStatus]=useState('checking');

  useEffect(()=>{
    smartFetch(`${API}/health`)
      .then(r=>r.json())
      .then(d=>setApiStatus(d.status==='ok'?'online':'error'))
      .catch(()=>setApiStatus('error'));
  },[]);

  const login=async(email,password)=>{
    const r=await smartFetch(`${API}/v1/auth/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Login failed');
    localStorage.setItem('ft',d.access_token);
    localStorage.setItem('ftu',JSON.stringify(d.user));
    setToken(d.access_token);setUser(d.user);
  };
  const logout=()=>{
    localStorage.removeItem('ft');localStorage.removeItem('ftu');
    setToken(null);setUser(null);
  };
  const api=useCallback(async(path,opts={})=>{
    const r=await smartFetch(`${API}${path}`,{
      ...opts,
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json',...(opts.headers||{})}
    });
    if(r.status===401){logout();throw new Error('Session expired');}
    return r.json();
  },[token]);
  return{token,user,login,logout,api,apiStatus};
}

function Login({onLogin,apiStatus}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const {login}=useAuth();

  const submit=async e=>{
    e.preventDefault();setLoading(true);setErr('');
    try{await login(email,pass);onLogin();}
    catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };

  const quick=(e,p)=>{setEmail(e);setPass(p);};

  return(
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <span className="login-logo-icon">🚚</span>
          <div className="login-logo-text">FleetOS</div>
          <div className="login-logo-sub">Last Mile Delivery Platform</div>
        </div>
        {apiStatus==='checking'&&<div className="info">⏳ Connecting to API...</div>}
        {apiStatus==='error'&&<div className="err">⚠️ API is starting up (Render free tier sleeps). Wait 30s and try again.</div>}
        {apiStatus==='online'&&<div className="info" style={{borderColor:'var(--green)',background:'rgba(62,207,142,.1)',color:'var(--green)'}}>✅ API online — ready to login</div>}
        {err&&<div className="err">{err}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@fleetos.io" required/>
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Admin@1234" required/>
          </div>
          <button className="btn btn-primary" disabled={loading}>
            {loading?<span className="spin"/>:'Sign in →'}
          </button>
        </form>
        <div style={{marginTop:14,fontSize:11,color:'var(--text3)',textAlign:'center',marginBottom:8}}>Quick login — click any role:</div>
        <div className="login-links">
          {[['Admin','admin@fleetos.io'],['Manager','manager@fleetos.io'],['Control Tower','ct@fleetos.io'],['Client','client@fleetos.io']].map(([l,e])=>(
            <div key={e} className="login-link" onClick={()=>quick(e,'Admin@1234')}>{l}</div>
          ))}
        </div>
        <div style={{marginTop:16,fontSize:10,color:'var(--text3)',textAlign:'center'}}>
          API: {API}
        </div>
      </div>
    </div>
  );
}

function StatCard({label,value,sub,color}){
  return(
    <div className={`card ${color}`}>
      <div className="card-label">{label}</div>
      <div className="card-value">{value}</div>
      {sub&&<div className="card-sub">{sub}</div>}
    </div>
  );
}

function Dashboard({api}){
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');

  useEffect(()=>{
    api('/v1/orders?limit=20')
      .then(d=>{setOrders(d.data||[]);setLoading(false);})
      .catch(e=>{setErr(e.message);setLoading(false);});
  },[]);

  const badge=s=>{
    const m={placed:'bb',assigned:'bp',picked_up:'ba',in_transit:'bb',delivered:'bg-b',failed:'br',rto:'br'};
    return <span className={`badge ${m[s]||'bk'}`}>{s?.replace(/_/g,' ')}</span>;
  };

  const delivered=orders.filter(o=>o.status==='delivered').length;
  const transit=orders.filter(o=>['in_transit','picked_up','assigned'].includes(o.status)).length;
  const failed=orders.filter(o=>o.status==='failed').length;

  return(
    <div>
      <div className="live-url">
        <div className="live-dot"/>
        <div>
          <div style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>API Connected</div>
          <div style={{fontSize:11,color:'var(--text2)',fontFamily:'monospace'}}>{API}</div>
        </div>
      </div>
      <div className="grid4">
        <StatCard label="Total orders" value={orders.length} sub="from live API" color="bl"/>
        <StatCard label="Delivered" value={delivered} sub={orders.length?`${Math.round(delivered/orders.length*100)}% success rate`:''} color="gl"/>
        <StatCard label="In transit" value={transit} color="al"/>
        <StatCard label="Failed" value={failed} color="rl"/>
      </div>
      <div className="card">
        <div className="section-title">Recent orders</div>
        {err&&<div className="err">{err}</div>}
        {loading?<div style={{color:'var(--text3)',padding:'20px 0',textAlign:'center'}}>Loading from live API...</div>:
        orders.length===0?
          <div style={{color:'var(--text3)',padding:'30px 0',textAlign:'center'}}>
            No orders yet — go to Orders tab and create your first order
          </div>:
          <table>
            <thead><tr><th>Order #</th><th>Customer</th><th>Drop address</th><th>COD</th><th>Status</th></tr></thead>
            <tbody>
              {orders.map(o=>(
                <tr key={o.id}>
                  <td style={{fontWeight:600,color:'var(--blue)'}}>{o.order_number}</td>
                  <td>{o.customer_name}</td>
                  <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.drop_address}</td>
                  <td>{o.cod_amount>0?`₹${o.cod_amount}`:<span style={{color:'var(--text3)'}}>Prepaid</span>}</td>
                  <td>{badge(o.status)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        }
      </div>
    </div>
  );
}

function Orders({api}){
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(true);
  const [show,setShow]=useState(false);
  const [creating,setCreating]=useState(false);
  const [cerr,setCerr]=useState('');
  const [f,setF]=useState({
    pickup_address:'Warehouse Sector 5 Delhi',pickup_lat:'28.6500',pickup_lng:'77.2300',
    drop_address:'H-22 Sector 14 Delhi',drop_lat:'28.6200',drop_lng:'77.3100',
    customer_name:'Rahul Sharma',customer_phone:'+919811234567',
    cod_amount:'350',weight_kg:'1.2'
  });

  const load=()=>{
    setLoading(true);
    api('/v1/orders?limit=50').then(d=>{setOrders(d.data||[]);setLoading(false);}).catch(()=>setLoading(false));
  };
  useEffect(load,[]);

  const create=async()=>{
    setCreating(true);setCerr('');
    try{
      await api('/v1/orders',{method:'POST',body:JSON.stringify({
        pickup:{lat:parseFloat(f.pickup_lat),lng:parseFloat(f.pickup_lng),address:f.pickup_address},
        dropoff:{lat:parseFloat(f.drop_lat),lng:parseFloat(f.drop_lng),address:f.drop_address},
        customer:{name:f.customer_name,phone:f.customer_phone},
        cod_amount:parseFloat(f.cod_amount),weight_kg:parseFloat(f.weight_kg)
      })});
      setShow(false);load();
    }catch(e){setCerr(e.message);}
    finally{setCreating(false);}
  };

  const badge=s=>{
    const m={placed:'bb',assigned:'bp',picked_up:'ba',in_transit:'bb',delivered:'bg-b',failed:'br',rto:'br'};
    return <span className={`badge ${m[s]||'bk'}`}>{s?.replace(/_/g,' ')}</span>;
  };

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',marginBottom:16}}>
        <div style={{flex:1,fontSize:15,fontWeight:600}}>Orders</div>
        <button className="btn-sm btn-green" onClick={()=>setShow(true)}>+ New Order</button>
      </div>

      {show&&(
        <div className="modal-bg" onClick={()=>setShow(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Create New Order</div>
            {cerr&&<div className="err">{cerr}</div>}
            {[['Pickup address','pickup_address'],['Drop address','drop_address'],
              ['Customer name','customer_name'],['Customer phone','customer_phone'],
              ['COD amount ₹','cod_amount'],['Weight kg','weight_kg']
            ].map(([l,k])=>(
              <div className="form-group" key={k}>
                <label className="form-label">{l}</label>
                <input className="form-input" value={f[k]} onChange={e=>setF({...f,[k]:e.target.value})}/>
              </div>
            ))}
            <div className="modal-footer">
              <button className="btn-sm btn-red" onClick={()=>setShow(false)}>Cancel</button>
              <button className="btn-sm btn-green" onClick={create} disabled={creating}>
                {creating?'Creating...':'Create Order'}
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        {loading?<div style={{color:'var(--text3)',padding:'20px 0',textAlign:'center'}}>Loading...</div>:
        <table>
          <thead><tr><th>Order #</th><th>Drop address</th><th>Customer</th><th>COD</th><th>Rider</th><th>Status</th><th>Time</th></tr></thead>
          <tbody>
            {orders.length===0?
              <tr><td colSpan={7} style={{textAlign:'center',color:'var(--text3)',padding:30}}>No orders — click + New Order to create one</td></tr>:
              orders.map(o=>(
                <tr key={o.id}>
                  <td style={{fontWeight:600,color:'var(--blue)'}}>{o.order_number}</td>
                  <td style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.drop_address}</td>
                  <td>{o.customer_name}</td>
                  <td>{o.cod_amount>0?`₹${o.cod_amount}`:<span style={{color:'var(--text3)'}}>Prepaid</span>}</td>
                  <td>{o.rider_name||<span style={{color:'var(--text3)'}}>—</span>}</td>
                  <td>{badge(o.status)}</td>
                  <td style={{color:'var(--text3)',fontSize:11}}>{new Date(o.created_at).toLocaleTimeString()}</td>
                </tr>
              ))
            }
          </tbody>
        </table>}
      </div>
    </div>
  );
}

function LiveMap(){
  const riders=[
    {id:'R1',name:'Ravi Kumar',status:'available',zone:'Zone A',drops:7,battery:85,cx:80,cy:80},
    {id:'R2',name:'Priya Mehta',status:'busy',zone:'Zone B',drops:5,battery:62,cx:280,cy:60},
    {id:'R3',name:'Amit Sharma',status:'available',zone:'Zone C',drops:3,battery:94,cx:100,cy:210},
    {id:'R4',name:'Sneha Tiwari',status:'busy',zone:'Zone A',drops:9,battery:41,cx:150,cy:110},
  ];
  const col=s=>s==='busy'?'var(--amber)':s==='available'?'var(--green)':'var(--text3)';
  return(
    <div>
      <div className="grid4" style={{marginBottom:16}}>
        <StatCard label="Online riders" value="4" sub="all zones" color="gl"/>
        <StatCard label="Busy" value="2" color="al"/>
        <StatCard label="Available" value="2" color="gl"/>
        <StatCard label="GPS interval" value="5s" color="bl"/>
      </div>
      <div className="grid2">
        <div className="card">
          <div className="section-title">Live map — Delhi NCR</div>
          <div className="map-box">
            <svg viewBox="0 0 400 300" width="100%" height="100%">
              <rect width="400" height="300" fill="var(--bg3)"/>
              <g stroke="var(--border)" strokeWidth="4" fill="none">
                {[75,150,225].map(y=><line key={y} x1="0" y1={y} x2="400" y2={y}/>)}
                {[100,200,300].map(x=><line key={x} x1={x} y1="0" x2={x} y2="300"/>)}
              </g>
              <rect x="8" y="8" width="185" height="135" fill="rgba(79,142,247,.07)" stroke="var(--blue)" strokeWidth="1" strokeOpacity=".4" rx="4"/>
              <rect x="203" y="8" width="185" height="135" fill="rgba(62,207,142,.07)" stroke="var(--green)" strokeWidth="1" strokeOpacity=".4" rx="4"/>
              <rect x="8" y="153" width="185" height="135" fill="rgba(251,191,36,.07)" stroke="var(--amber)" strokeWidth="1" strokeOpacity=".4" rx="4"/>
              <text x="18" y="24" fontSize="10" fill="var(--blue)" opacity=".8" fontFamily="sans-serif">Zone A</text>
              <text x="213" y="24" fontSize="10" fill="var(--green)" opacity=".8" fontFamily="sans-serif">Zone B</text>
              <text x="18" y="169" fontSize="10" fill="var(--amber)" opacity=".8" fontFamily="sans-serif">Zone C</text>
              {riders.map((r,i)=>{
                const c=col(r.status);
                return <g key={r.id}>
                  <circle cx={r.cx} cy={r.cy} r="11" fill="none" stroke={c} strokeWidth="1" opacity=".3">
                    <animate attributeName="r" values="11;20;11" dur={`${1.6+i*.35}s`} repeatCount="indefinite"/>
                    <animate attributeName="opacity" values=".3;0;.3" dur={`${1.6+i*.35}s`} repeatCount="indefinite"/>
                  </circle>
                  <circle cx={r.cx} cy={r.cy} r="10" fill={c} opacity=".95"/>
                  <text x={r.cx} y={r.cy+4} textAnchor="middle" fontSize="9" fill="white" fontFamily="sans-serif" fontWeight="700">{r.id}</text>
                </g>;
              })}
            </svg>
            <div className="map-legend">
              {[['var(--green)','Available'],['var(--amber)','Busy'],['var(--red)','Delayed']].map(([c,l])=>(
                <div key={l} className="leg-row"><span className="leg-dot" style={{background:c}}/>{l}</div>
              ))}
            </div>
          </div>
        </div>
        <div className="card">
          <div className="section-title">Rider status</div>
          {riders.map(r=>(
            <div key={r.id} className="rider-card">
              <div className="avatar">{r.name.split(' ').map(n=>n[0]).join('')}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
                <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{r.zone} · <span style={{color:col(r.status)}}>{r.status}</span> · 🔋{r.battery}%</div>
                <div style={{height:3,background:'var(--border)',borderRadius:2,marginTop:6,width:120}}>
                  <div style={{height:'100%',borderRadius:2,width:`${r.battery}%`,background:r.battery<30?'var(--red)':'var(--green)'}}/>
                </div>
              </div>
              <span className={`badge ${r.status==='available'?'bg-b':'ba'}`}>{r.status}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function APIPanel(){
  const eps=[
    ['GET','/health','Health check — no auth needed'],
    ['POST','/v1/auth/login','Login — returns access_token + refresh_token'],
    ['POST','/v1/auth/refresh','Refresh expired access token'],
    ['GET','/v1/orders','List orders (auth required)'],
    ['POST','/v1/orders','Create new order'],
    ['GET','/v1/orders/:id','Get single order with status history'],
    ['PUT','/v1/orders/:id/status','Update order status'],
    ['DELETE','/v1/orders/:id','Cancel order (before pickup only)'],
    ['GET','/v1/track/:id','Public tracking — no auth'],
  ];
  return(
    <div>
      <div className="live-url">
        <div className="live-dot"/>
        <div>
          <div style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>Live API Base URL</div>
          <div style={{fontSize:12,color:'var(--text2)',fontFamily:'monospace'}}>{API}</div>
        </div>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div className="section-title">API Endpoints</div>
        {eps.map(([m,p,d])=>(
          <div key={p} className="api-block">
            <span className={`method ${m.toLowerCase()}`}>{m}</span>
            <span style={{color:'var(--text)',fontWeight:500}}>{p}</span>
            <span style={{color:'var(--text3)',marginLeft:12,fontSize:11}}>{d}</span>
          </div>
        ))}
      </div>
      <div className="grid2">
        <div className="card">
          <div className="section-title">Test login</div>
          <div className="api-block">{`curl -X POST ${API}/v1/auth/login \
  -H "Content-Type: application/json" \
  -d '{"email":"admin@fleetos.io",
       "password":"Admin@1234"}'`}</div>
        </div>
        <div className="card">
          <div className="section-title">Dev credentials</div>
          <div style={{fontSize:11,color:'var(--text3)',marginBottom:10}}>All passwords: Admin@1234</div>
          {[['Admin','admin@fleetos.io'],['Manager','manager@fleetos.io'],
            ['Control Tower','ct@fleetos.io'],['Client','client@fleetos.io']].map(([r,e])=>(
            <div key={e} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid rgba(46,50,80,.4)',fontSize:12}}>
              <span style={{color:'var(--text2)'}}>{r}</span>
              <span style={{fontFamily:'monospace',color:'var(--blue)',fontSize:11}}>{e}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const {token,user,logout,api,apiStatus}=useAuth();
  const [loggedIn,setLoggedIn]=useState(!!token);
  const [active,setActive]=useState('dashboard');

  const nav=[
    {s:'Operations'},
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'livemap',icon:'🗺️',label:'Live Map',badge:4},
    {id:'orders',icon:'📦',label:'Orders'},
    {s:'Developer'},
    {id:'api',icon:'⚡',label:'API Docs'},
  ];

  const titles={dashboard:'Operations Dashboard',livemap:'Live Map — Rider Tracking',orders:'Order Management',api:'API Documentation'};
  const panels={
    dashboard:<Dashboard api={api}/>,
    livemap:<LiveMap/>,
    orders:<Orders api={api}/>,
    api:<APIPanel/>,
  };

  if(!loggedIn) return <Login onLogin={()=>setLoggedIn(true)} apiStatus={apiStatus}/>;

  return(
    <div className="shell">
      <div className="sidebar">
        <div className="logo">
          <span style={{fontSize:22}}>🚚</span>
          <div><div className="logo-text">FleetOS</div><div className="logo-sub">Control Tower</div></div>
        </div>
        <div className="nav">
          {nav.map((item,i)=>item.s?
            <div key={i} className="nav-section">{item.s}</div>:
            <div key={item.id} className={`nav-item ${active===item.id?'active':''}`} onClick={()=>setActive(item.id)}>
              <span style={{fontSize:16,width:20,textAlign:'center'}}>{item.icon}</span>
              <span>{item.label}</span>
              {item.badge&&<span className="nav-badge">{item.badge}</span>}
            </div>
          )}
        </div>
        <div className="role-bar">
          <div className="role-label">Signed in as</div>
          <div style={{fontSize:12,color:'var(--text)',fontWeight:500,marginBottom:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.name||user?.email}</div>
          <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>{user?.role}</div>
          <button className="btn btn-primary" style={{padding:'7px 0',fontSize:12}} onClick={()=>{logout();setLoggedIn(false);}}>Sign out</button>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{titles[active]}</div>
          <div className="pill"><span className={`dot ${apiStatus==='online'?'dot-g':'dot-r'}`}/>{apiStatus==='online'?'API Live':'API connecting...'}</div>
          <div className="pill"><span className="dot dot-a"/>Kafka offline</div>
          <div className="pill" style={{fontSize:11,color:'var(--text2)'}}>{user?.role}</div>
        </div>
        <div className="content">{panels[active]}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
