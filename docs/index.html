<!DOCTYPE html>
<!-- build: v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FleetOS — Control Tower</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>

* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
  --border: #2e3250; --text: #e8eaf6; --text2: #8b90b8; --text3: #555a7a;
  --blue: #4f8ef7; --green: #3ecf8e; --red: #f87171; --amber: #fbbf24;
  --purple: #a78bfa; --sidebar: 220px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; overflow: hidden; }
.shell { display: flex; height: 100vh; }

/* Sidebar */
.sidebar { width: var(--sidebar); background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; }
.logo { padding: 18px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 22px; }
.logo-text { font-size: 16px; font-weight: 700; color: var(--text); }
.logo-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
.nav-section { font-size: 10px; font-weight: 600; color: var(--text3); padding: 12px 8px 4px;
  text-transform: uppercase; letter-spacing: .08em; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px;
  cursor: pointer; color: var(--text2); transition: all .12s; margin-bottom: 2px; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(79,142,247,.15); color: var(--blue); }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px;
  padding: 1px 6px; border-radius: 10px; font-weight: 600; }
.role-bar { padding: 12px; border-top: 1px solid var(--border); }
.role-label { font-size: 10px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; }
.role-select { width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 6px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 20px;
  display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
.pill { display: flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px; font-size: 11px; color: var(--text2); }
.dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-green { background: var(--green); }
.dot-amber { background: var(--amber); }
.dot-red { background: var(--red); }
.content { flex: 1; overflow-y: auto; padding: 20px; }

/* Cards */
.grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
.grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 16px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.card.bl { border-left: 3px solid var(--blue); }
.card.gl { border-left: 3px solid var(--green); }
.card.rl { border-left: 3px solid var(--red); }
.card.al { border-left: 3px solid var(--amber); }
.card-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.card-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
.card-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 10px; color: var(--text3); border-bottom: 1px solid var(--border);
  font-weight: 500; font-size: 11px; }
td { padding: 9px 10px; border-bottom: 1px solid rgba(46,50,80,.5); color: var(--text); vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,.02); }
tr:last-child td { border-bottom: none; }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 8px;
  font-size: 11px; font-weight: 500; }
.badge-blue { background: rgba(79,142,247,.15); color: var(--blue); }
.badge-green { background: rgba(62,207,142,.15); color: var(--green); }
.badge-red { background: rgba(248,113,113,.15); color: var(--red); }
.badge-amber { background: rgba(251,191,36,.15); color: var(--amber); }
.badge-gray { background: var(--bg3); color: var(--text2); }
.badge-purple { background: rgba(167,139,250,.15); color: var(--purple); }

/* Map */
.map-box { background: var(--bg3); border-radius: 10px; height: 320px; position: relative; overflow: hidden; }
.map-grid { position: absolute; inset: 0; }
.map-overlay { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 6px; }
.map-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: 12px; cursor: pointer; color: var(--text); }
.map-legend { position: absolute; bottom: 10px; right: 10px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 11px; }
.leg-row { display: flex; align-items: center; gap: 7px; color: var(--text2); margin-bottom: 4px; }
.leg-row:last-child { margin-bottom: 0; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Login */
.login-wrap { display: flex; align-items: center; justify-content: center; height: 100vh;
  background: var(--bg); }
.login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
  padding: 36px; width: 380px; }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo-icon { font-size: 36px; display: block; margin-bottom: 8px; }
.login-logo-text { font-size: 22px; font-weight: 700; }
.login-logo-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 13px; outline: none; }
.form-input:focus { border-color: var(--blue); }
.btn { display: block; width: 100%; padding: 11px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .12s; }
.btn:hover { opacity: .85; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-sm { display: inline-flex; align-items: center; padding: 5px 12px; border-radius: 6px;
  border: none; font-size: 11px; font-weight: 500; cursor: pointer; }
.btn-blue { background: rgba(79,142,247,.2); color: var(--blue); }
.btn-green { background: rgba(62,207,142,.2); color: var(--green); }
.btn-red { background: rgba(248,113,113,.2); color: var(--red); }
.login-links { display: flex; justify-content: center; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.login-link { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: 11px; color: var(--text2); cursor: pointer; }
.login-link:hover { color: var(--text); }
.error-msg { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3);
  color: var(--red); padding: 10px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 14px; }
.loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.panel { display: none; } .panel.active { display: block; }
.stat-row { display: flex; gap: 8px; align-items: center; padding: 7px 0;
  border-bottom: 1px solid rgba(46,50,80,.4); }
.stat-row:last-child { border-bottom: none; }
.stat-label { flex: 1; color: var(--text2); font-size: 12px; }
.stat-val { font-weight: 600; font-size: 13px; }
.rider-card { background: var(--bg3); border-radius: 10px; padding: 12px 14px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.av-blue { background: rgba(79,142,247,.2); color: var(--blue); }
.av-green { background: rgba(62,207,142,.2); color: var(--green); }
.av-amber { background: rgba(251,191,36,.2); color: var(--amber); }
.rider-name { font-weight: 600; font-size: 13px; }
.rider-detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
.mini-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; width: 100px; }
.mini-fill { height: 100%; border-radius: 2px; background: var(--green); }
.api-block { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; margin-bottom: 8px; font-family: monospace; font-size: 12px; }
.method { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px;
  font-weight: 700; margin-right: 8px; }
.get { background: rgba(62,207,142,.2); color: var(--green); }
.post { background: rgba(79,142,247,.2); color: var(--blue); }
.put { background: rgba(251,191,36,.2); color: var(--amber); }
.del { background: rgba(248,113,113,.2); color: var(--red); }
.live-url { background: var(--bg3); border: 1px solid var(--green); border-radius: 8px;
  padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
input[type=text],input[type=email],input[type=password] { width: 100%; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
  align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
  padding: 24px; width: 460px; max-width: 95vw; }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const API = 'https://fleetos-xcgj.onrender.com';
const { useState, useEffect, useCallback, useRef } = React;

// ── Auth ──────────────────────────────────────────────────────────────
function useAuth() {
  const [token, setToken] = useState(localStorage.getItem('fleetos_token'));
  const [user, setUser] = useState(JSON.parse(localStorage.getItem('fleetos_user') || 'null'));

  const login = async (email, password) => {
    const res = await fetch(`${API}/v1/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('fleetos_token', data.access_token);
    localStorage.setItem('fleetos_user', JSON.stringify(data.user));
    setToken(data.access_token);
    setUser(data.user);
    return data;
  };

  const logout = () => {
    localStorage.removeItem('fleetos_token');
    localStorage.removeItem('fleetos_user');
    setToken(null); setUser(null);
  };

  const apiFetch = useCallback(async (path, opts = {}) => {
    const res = await fetch(`${API}${path}`, {
      ...opts,
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
    });
    if (res.status === 401) { logout(); throw new Error('Session expired'); }
    return res.json();
  }, [token]);

  return { token, user, login, logout, apiFetch };
}

// ── Login Page ─────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const { login } = useAuth();

  const quickLogin = (e, p) => { setEmail(e); setPass(p); };

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    try { await login(email, pass); onLogin(); }
    catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <span className="login-logo-icon">🚚</span>
          <div className="login-logo-text">FleetOS</div>
          <div className="login-logo-sub">Last Mile Delivery Platform</div>
        </div>
        {error && <div className="error-msg">{error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" value={email}
              onChange={e => setEmail(e.target.value)} placeholder="admin@fleetos.io" required />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" value={pass}
              onChange={e => setPass(e.target.value)} placeholder="••••••••" required />
          </div>
          <button className="btn btn-primary" type="submit" disabled={loading}>
            {loading ? <span className="loading" /> : 'Sign in →'}
          </button>
        </form>
        <div style={{marginTop:16,fontSize:11,color:'var(--text3)',textAlign:'center',marginBottom:8}}>Quick login:</div>
        <div className="login-links">
          {[['admin@fleetos.io','Admin'],['manager@fleetos.io','Manager'],['ct@fleetos.io','Control Tower'],['client@fleetos.io','Client']].map(([e,label]) => (
            <div key={e} className="login-link" onClick={() => quickLogin(e,'Admin@1234')}>{label}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Stat Card ──────────────────────────────────────────────────────────
function StatCard({ label, value, sub, color }) {
  return (
    <div className={`card ${color}`}>
      <div className="card-label">{label}</div>
      <div className="card-value">{value}</div>
      {sub && <div className="card-sub">{sub}</div>}
    </div>
  );
}

// ── Dashboard Panel ────────────────────────────────────────────────────
function Dashboard({ apiFetch }) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch('/v1/orders?limit=10').then(d => { setOrders(d.data || []); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  const statusBadge = (s) => {
    const map = { placed:'badge-blue', assigned:'badge-purple', picked_up:'badge-amber',
      in_transit:'badge-blue', delivered:'badge-green', failed:'badge-red', rto:'badge-red' };
    return <span className={`badge ${map[s]||'badge-gray'}`}>{s?.replace('_',' ')}</span>;
  };

  const delivered = orders.filter(o=>o.status==='delivered').length;
  const inTransit = orders.filter(o=>['in_transit','picked_up','assigned'].includes(o.status)).length;
  const failed = orders.filter(o=>o.status==='failed').length;

  return (
    <div>
      <div className="live-url">
        <div className="live-dot"></div>
        <div>
          <div style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>API Live</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>{API}</div>
        </div>
      </div>
      <div className="grid4">
        <StatCard label="Total orders" value={orders.length} sub="Last 10 fetched" color="bl" />
        <StatCard label="Delivered" value={delivered} sub={`${orders.length?Math.round(delivered/orders.length*100):0}% rate`} color="gl" />
        <StatCard label="In transit" value={inTransit} color="al" />
        <StatCard label="Failed" value={failed} color="rl" />
      </div>
      <div className="card">
        <div className="section-title">Recent orders</div>
        {loading ? <div style={{color:'var(--text3)',padding:20,textAlign:'center'}}>Loading...</div> :
        orders.length === 0 ? (
          <div style={{color:'var(--text3)',padding:20,textAlign:'center'}}>
            No orders yet. Create your first order using the Orders panel.
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Order #</th><th>Client</th><th>Drop address</th><th>COD</th><th>Status</th><th>SLA</th></tr></thead>
              <tbody>
                {orders.map(o => (
                  <tr key={o.id}>
                    <td style={{fontWeight:600,color:'var(--blue)'}}>{o.order_number}</td>
                    <td>{o.client_name || '—'}</td>
                    <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.drop_address}</td>
                    <td>{o.cod_amount > 0 ? `₹${o.cod_amount}` : <span style={{color:'var(--text3)'}}>Prepaid</span>}</td>
                    <td>{statusBadge(o.status)}</td>
                    <td style={{fontSize:11,color:'var(--text3)'}}>{o.sla_minutes}m</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Orders Panel ───────────────────────────────────────────────────────
function OrdersPanel({ apiFetch }) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [form, setForm] = useState({ pickup_address:'Warehouse, Sector 5, Delhi', pickup_lat:'28.6500', pickup_lng:'77.2300',
    drop_address:'H-22, Sector 14, Delhi', drop_lat:'28.6200', drop_lng:'77.3100',
    customer_name:'', customer_phone:'', cod_amount:'0', weight_kg:'1' });
  const [creating, setCreating] = useState(false);
  const [createError, setCreateError] = useState('');

  const load = () => {
    setLoading(true);
    apiFetch('/v1/orders?limit=50').then(d => { setOrders(d.data||[]); setLoading(false); }).catch(()=>setLoading(false));
  };
  useEffect(load, []);

  const createOrder = async () => {
    setCreating(true); setCreateError('');
    try {
      await apiFetch('/v1/orders', { method:'POST', body: JSON.stringify({
        pickup: { lat: parseFloat(form.pickup_lat), lng: parseFloat(form.pickup_lng), address: form.pickup_address },
        dropoff: { lat: parseFloat(form.drop_lat), lng: parseFloat(form.drop_lng), address: form.drop_address },
        customer: { name: form.customer_name, phone: form.customer_phone },
        cod_amount: parseFloat(form.cod_amount), weight_kg: parseFloat(form.weight_kg)
      })});
      setShowCreate(false); load();
    } catch(e) { setCreateError(e.message); }
    finally { setCreating(false); }
  };

  const statusBadge = (s) => {
    const map = { placed:'badge-blue', assigned:'badge-purple', picked_up:'badge-amber',
      in_transit:'badge-blue', delivered:'badge-green', failed:'badge-red', rto:'badge-red' };
    return <span className={`badge ${map[s]||'badge-gray'}`}>{s?.replace('_',' ')}</span>;
  };

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',marginBottom:16}}>
        <div style={{flex:1,fontSize:15,fontWeight:600}}>Orders</div>
        <button className="btn-sm btn-green" style={{borderRadius:8,padding:'7px 14px',fontSize:12}} onClick={()=>setShowCreate(true)}>+ New Order</button>
      </div>

      {showCreate && (
        <div className="modal-bg" onClick={()=>setShowCreate(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Create New Order</div>
            {createError && <div className="error-msg">{createError}</div>}
            {[
              ['Pickup address','pickup_address','text'],['Drop address','drop_address','text'],
              ['Customer name','customer_name','text'],['Customer phone','customer_phone','text'],
              ['COD amount (₹)','cod_amount','text'],['Weight (kg)','weight_kg','text'],
            ].map(([label,key,type]) => (
              <div className="form-group" key={key}>
                <label className="form-label">{label}</label>
                <input className="form-input" type={type} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} />
              </div>
            ))}
            <div className="modal-footer">
              <button className="btn-sm btn-red" style={{padding:'8px 16px',borderRadius:8}} onClick={()=>setShowCreate(false)}>Cancel</button>
              <button className="btn-sm btn-green" style={{padding:'8px 16px',borderRadius:8}} onClick={createOrder} disabled={creating}>
                {creating ? 'Creating...' : 'Create Order'}
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        {loading ? <div style={{color:'var(--text3)',padding:20,textAlign:'center'}}>Loading orders...</div> :
        <div className="table-wrap">
          <table>
            <thead><tr><th>Order #</th><th>Drop Address</th><th>Customer</th><th>Rider</th><th>COD</th><th>Status</th><th>Created</th></tr></thead>
            <tbody>
              {orders.length === 0 ? (
                <tr><td colSpan={7} style={{textAlign:'center',color:'var(--text3)',padding:30}}>No orders yet. Click "+ New Order" to create one.</td></tr>
              ) : orders.map(o => (
                <tr key={o.id}>
                  <td style={{fontWeight:600,color:'var(--blue)'}}>{o.order_number}</td>
                  <td style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.drop_address}</td>
                  <td>{o.customer_name}</td>
                  <td>{o.rider_name || <span style={{color:'var(--text3)'}}>Unassigned</span>}</td>
                  <td>{o.cod_amount>0?`₹${o.cod_amount}`:<span style={{color:'var(--text3)'}}>Prepaid</span>}</td>
                  <td>{statusBadge(o.status)}</td>
                  <td style={{color:'var(--text3)',fontSize:11}}>{new Date(o.created_at).toLocaleTimeString()}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

// ── Live Map Panel ─────────────────────────────────────────────────────
function LiveMapPanel() {
  const riders = [
    {id:'R1',name:'Ravi Kumar',lat:28.63,lng:77.22,status:'available',zone:'Zone A',deliveries:7,battery:85},
    {id:'R2',name:'Priya Mehta',lat:28.65,lng:77.28,status:'busy',zone:'Zone B',deliveries:5,battery:62},
    {id:'R3',name:'Amit Sharma',lat:28.61,lng:77.25,status:'available',zone:'Zone C',deliveries:3,battery:94},
    {id:'R4',name:'Sneha Tiwari',lat:28.67,lng:77.31,status:'busy',zone:'Zone A',deliveries:9,battery:41},
  ];

  const statusColor = s => s==='busy'?'var(--amber)':s==='available'?'var(--green)':'var(--text3)';

  return (
    <div>
      <div className="grid4" style={{marginBottom:16}}>
        <StatCard label="Online riders" value="4" sub="of 4 total" color="gl" />
        <StatCard label="Active deliveries" value="2" color="al" />
        <StatCard label="Avg GPS accuracy" value="±8m" color="bl" />
        <StatCard label="Zone coverage" value="3/3" color="gl" />
      </div>
      <div className="grid2">
        <div className="card">
          <div className="section-title" style={{marginBottom:10}}>Live map — Delhi zones</div>
          <div className="map-box">
            <svg className="map-grid" viewBox="0 0 500 320" width="100%" height="100%">
              <rect width="500" height="320" fill="var(--bg3)"/>
              <g stroke="var(--border)" strokeWidth="6" fill="none">
                {[80,160,240].map(y=><line key={y} x1="0" y1={y} x2="500" y2={y}/>)}
                {[100,200,300,400].map(x=><line key={x} x1={x} y1="0" x2={x} y2="320"/>)}
              </g>
              <rect x="10" y="10" width="185" height="150" fill="rgba(79,142,247,.06)" stroke="var(--blue)" strokeWidth="1" strokeOpacity=".3" rx="4"/>
              <rect x="205" y="10" width="185" height="150" fill="rgba(62,207,142,.06)" stroke="var(--green)" strokeWidth="1" strokeOpacity=".3" rx="4"/>
              <rect x="10" y="170" width="185" height="140" fill="rgba(251,191,36,.06)" stroke="var(--amber)" strokeWidth="1" strokeOpacity=".3" rx="4"/>
              <text x="20" y="26" fontSize="10" fill="var(--blue)" opacity=".7" fontFamily="sans-serif">Zone A</text>
              <text x="215" y="26" fontSize="10" fill="var(--green)" opacity=".7" fontFamily="sans-serif">Zone B</text>
              <text x="20" y="186" fontSize="10" fill="var(--amber)" opacity=".7" fontFamily="sans-serif">Zone C</text>
              {riders.map((r,i) => {
                const cx = 60+i*105, cy = i%2===0?80:200;
                const col = statusColor(r.status);
                return (
                  <g key={r.id}>
                    <circle cx={cx} cy={cy} r="14" fill="none" stroke={col} strokeWidth="1" opacity=".3">
                      <animate attributeName="r" values="14;22;14" dur={`${1.8+i*.3}s`} repeatCount="indefinite"/>
                      <animate attributeName="opacity" values=".3;0;.3" dur={`${1.8+i*.3}s`} repeatCount="indefinite"/>
                    </circle>
                    <circle cx={cx} cy={cy} r="10" fill={col} opacity=".9"/>
                    <text x={cx} y={cy+4} textAnchor="middle" fontSize="9" fill="white" fontFamily="sans-serif" fontWeight="600">{r.id}</text>
                  </g>
                );
              })}
            </svg>
            <div className="map-legend">
              {[['var(--green)','Available'],['var(--amber)','Busy'],['var(--red)','Delayed']].map(([c,l])=>(
                <div key={l} className="leg-row"><span className="leg-dot" style={{background:c}}/>{l}</div>
              ))}
            </div>
          </div>
        </div>
        <div className="card">
          <div className="section-title">Rider status</div>
          {riders.map(r => (
            <div key={r.id} className="rider-card">
              <div className="avatar av-blue">{r.name.split(' ').map(n=>n[0]).join('')}</div>
              <div style={{flex:1}}>
                <div className="rider-name">{r.name}</div>
                <div className="rider-detail">{r.zone} · <span style={{color:statusColor(r.status)}}>{r.status}</span> · 🔋{r.battery}%</div>
                <div className="rider-detail">{r.deliveries} drops today</div>
                <div className="mini-bar"><div className="mini-fill" style={{width:`${r.battery}%`,background:r.battery<30?'var(--red)':'var(--green)'}}/></div>
              </div>
              <span className={`badge ${r.status==='available'?'badge-green':'badge-amber'}`}>{r.status}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── API Docs Panel ─────────────────────────────────────────────────────

  const endpoints = [
    ['POST','/v1/auth/login','Login — returns access_token'],
    ['POST','/v1/auth/refresh','Refresh access token'],
    ['GET','/v1/orders','List orders (auth required)'],
    ['POST','/v1/orders','Create new order'],
    ['GET','/v1/orders/:id','Get single order + history'],
    ['PUT','/v1/orders/:id/status','Update order status'],
    ['DELETE','/v1/orders/:id','Cancel order'],
    ['GET','/v1/track/:id','Public tracking (no auth)'],
    ['GET','/health','Service health check'],
  ];
  return (
    <div>
      <div className="live-url" style={{marginBottom:16}}>
        <div className="live-dot"/>
        <div>
          <div style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>Base URL</div>
          <div style={{fontSize:12,color:'var(--text2)',fontFamily:'monospace'}}>{API}</div>
        </div>
      </div>
      <div className="card">
        <div className="section-title">Endpoints</div>
        {endpoints.map(([method,path,desc])=>(
          <div key={path} className="api-block">
            <span className={`method ${method.toLowerCase()}`}>{method}</span>
            <span style={{color:'var(--text)',fontWeight:500}}>{path}</span>
            <span style={{color:'var(--text3)',marginLeft:12}}>{desc}</span>

       "password":"Admin@1234"}'`}</div>
        </div>
        <div className="card">
          <div className="section-title">Dev credentials</div>
          {[['Admin','admin@fleetos.io'],['Manager','manager@fleetos.io'],['Control Tower','ct@fleetos.io'],['Client','client@fleetos.io']].map(([r,e])=>(

        </div>
      </div>

// ── Main App ───────────────────────────────────────────────────────────
function App() {
  const { token, user, login, logout, apiFetch } = useAuth();
  const [loggedIn, setLoggedIn] = useState(!!token);
  const [active, setActive] = useState('dashboard');

  const nav = [
    { section: 'Operations' },
    { id:'dashboard', icon:'📊', label:'Dashboard' },
    { id:'livemap', icon:'🗺️', label:'Live Map', badge:4 },
    { id:'orders', icon:'📦', label:'Orders' },
    { section: 'Management' },
    { id:'riders', icon:'🏍️', label:'Riders' },
    { section: 'Developer' },
    { id:'api', icon:'⚡', label:'API Docs' },
  ];

  if (!loggedIn) return <LoginPage onLogin={()=>setLoggedIn(true)} />;

  const panels = {
    dashboard: <Dashboard apiFetch={apiFetch} />,
    livemap: <LiveMapPanel />,
    orders: <OrdersPanel apiFetch={apiFetch} />,
    riders: <LiveMapPanel />,
    api: <APIPanel />,
  };

  const titles = { dashboard:'Operations Dashboard', livemap:'Live Map', orders:'Order Management', riders:'Rider Management', api:'API Documentation' };

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="logo">
          <span className="logo-icon">🚚</span>
          <div><div className="logo-text">FleetOS</div><div className="logo-sub">Last Mile Platform</div></div>
        </div>
        <div className="nav">
          {nav.map((item,i) => item.section ? (
            <div key={i} className="nav-section">{item.section}</div>
          ) : (
            <div key={item.id} className={`nav-item ${active===item.id?'active':''}`} onClick={()=>setActive(item.id)}>
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </div>
          ))}
        </div>
        <div className="role-bar">
          <div className="role-label">Logged in as</div>
          <div style={{fontSize:12,color:'var(--text)',fontWeight:500,marginBottom:8}}>{user?.name || user?.email}</div>
          <button className="btn btn-primary" style={{padding:'6px 0',fontSize:12}} onClick={()=>{logout();setLoggedIn(false);}}>Sign out</button>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{titles[active]}</div>
          <div className="pill"><span className="dot dot-green"/>API Live</div>
          <div className="pill"><span className="dot dot-amber"/>Kafka offline</div>
          <div className="pill" style={{fontSize:11,color:'var(--text2)'}}>{user?.role}</div>
        </div>
        <div className="content">{panels[active]}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
